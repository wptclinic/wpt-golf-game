<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Hit The Golf - Rehab Game</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #1f7a36;
      touch-action: manipulation;
    }

    body {
      position: fixed;
      inset: 0;
    }

    #game {
      position: relative;
      width: 100vw;
      height: 100dvh;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.25), transparent 20%),
        linear-gradient(145deg, #8fdb5f 0%, #45a947 45%, #1d7835 100%);
    }

    /* พื้นสนาม */
    #fairway {
      position: absolute;
      left: -10%;
      top: 35%;
      width: 120%;
      height: 45%;
      background: linear-gradient(90deg, #7ccc4e, #a8e36e, #6abd46);
      border-radius: 50%;
      transform: rotate(-5deg);
      box-shadow: inset 0 0 40px rgba(255,255,255,0.2);
      z-index: 1;
    }

    /* หญ้าลาย */
    #game::before {
      content: "";
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        90deg,
        rgba(255,255,255,0.08) 0px,
        rgba(255,255,255,0.08) 25px,
        rgba(0,0,0,0.04) 25px,
        rgba(0,0,0,0.04) 50px
      );
      opacity: 0.45;
      z-index: 0;
    }

    /* Header */
    #topBar {
      position: absolute;
      top: calc(10px + env(safe-area-inset-top, 0px));
      left: 12px;
      right: 12px;
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 50;
      pointer-events: none;
    }

    #brand {
      display: flex;
      align-items: center;
      gap: 10px;
      color: white;
      font-size: clamp(16px, 2.8vw, 30px);
      font-weight: bold;
      text-shadow: 1px 2px 4px rgba(0,0,0,0.5);
    }

    #brand img {
      width: clamp(46px, 7vw, 76px);
      height: clamp(46px, 7vw, 76px);
      border-radius: 50%;
      object-fit: contain;
      background: white;
      padding: 4px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.25);
    }

    #scoreBoard {
      color: white;
      font-size: clamp(18px, 3vw, 34px);
      font-weight: bold;
      background: rgba(0,0,0,0.25);
      padding: 10px 18px;
      border-radius: 18px;
      text-shadow: 1px 2px 4px rgba(0,0,0,0.5);
    }

    /* หลุม */
    #hole {
      position: absolute;
      right: 10vw;
      top: 50%;
      width: clamp(80px, 13vw, 150px);
      height: clamp(80px, 13vw, 150px);
      border-radius: 50%;
      background: radial-gradient(circle, #000 0%, #111 45%, #444 68%, #225c2e 72%);
      box-shadow:
        inset 0 0 25px #000,
        0 8px 20px rgba(0,0,0,0.35);
      transform: translateY(-50%);
      z-index: 5;
    }

    /* ธง */
    #flagPole {
      position: absolute;
      right: calc(10vw + 70px);
      top: 27%;
      width: 7px;
      height: clamp(110px, 20vw, 190px);
      background: white;
      z-index: 6;
      box-shadow: 1px 2px 4px rgba(0,0,0,0.4);
    }

    #flagPole::after {
      content: "";
      position: absolute;
      top: 0;
      left: 7px;
      width: 0;
      height: 0;
      border-top: 28px solid transparent;
      border-bottom: 28px solid transparent;
      border-left: 70px solid #e72d2d;
      filter: drop-shadow(1px 2px 3px rgba(0,0,0,0.3));
    }

    /* ลูกกอล์ฟ */
    #ball {
      position: absolute;
      left: 16vw;
      top: 58%;
      width: clamp(48px, 8vw, 86px);
      height: clamp(48px, 8vw, 86px);
      border-radius: 50%;
      background:
        radial-gradient(circle at 28% 25%, #ffffff 0%, #ffffff 24%, #dddddd 70%, #aaaaaa 100%);
      box-shadow:
        0 8px 16px rgba(0,0,0,0.38),
        inset -8px -10px 15px rgba(0,0,0,0.12);
      transform: translate(-50%, -50%);
      z-index: 10;
      transition: left 0.35s ease, top 0.35s ease, transform 0.25s ease;
    }

    #ball::before {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 20% 20%, rgba(0,0,0,0.12) 0 2px, transparent 3px),
        radial-gradient(circle at 60% 35%, rgba(0,0,0,0.12) 0 2px, transparent 3px),
        radial-gradient(circle at 35% 70%, rgba(0,0,0,0.12) 0 2px, transparent 3px),
        radial-gradient(circle at 75% 72%, rgba(0,0,0,0.12) 0 2px, transparent 3px);
    }

    #message {
      position: absolute;
      left: 50%;
      top: 23%;
      transform: translateX(-50%);
      color: white;
      font-size: clamp(24px, 5vw, 58px);
      font-weight: bold;
      text-shadow: 2px 3px 6px rgba(0,0,0,0.6);
      z-index: 60;
      opacity: 0;
      transition: opacity 0.25s ease;
      text-align: center;
      pointer-events: none;
    }

    #message.show {
      opacity: 1;
    }

    /* กล่องกล้อง สำคัญสำหรับ iPad */
    #cameraBox {
      position: fixed;
      left: 10px;
      bottom: calc(10px + env(safe-area-inset-bottom, 0px));
      width: min(26vw, 220px);
      aspect-ratio: 4 / 3;
      border: 3px solid white;
      border-radius: 16px;
      overflow: hidden;
      background: #000;
      z-index: 100;
      box-shadow: 0 5px 16px rgba(0,0,0,0.45);
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: contain; /* สำคัญ: ไม่ให้กล้องตกขอบ */
      transform: scaleX(-1); /* mirror */
      background: #000;
      display: block;
    }

    #cameraLabel {
      position: absolute;
      left: 8px;
      top: 6px;
      color: white;
      font-size: 12px;
      background: rgba(0,0,0,0.5);
      padding: 3px 7px;
      border-radius: 10px;
      z-index: 101;
      pointer-events: none;
    }

    /* ปุ่ม */
    #controls {
      position: absolute;
      left: 50%;
      bottom: calc(18px + env(safe-area-inset-bottom, 0px));
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 120;
    }

    button {
      border: none;
      border-radius: 18px;
      padding: 14px 22px;
      font-size: clamp(16px, 2.8vw, 26px);
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    #startBtn {
      background: white;
      color: #08712d;
    }

    #hitBtn {
      background: #ffeb3b;
      color: #164d20;
      display: none;
    }

    #resetBtn {
      background: #ffffff;
      color: #333;
      display: none;
    }

    #watermark {
      position: absolute;
      right: 12px;
      bottom: calc(10px + env(safe-area-inset-bottom, 0px));
      color: rgba(255,255,255,0.9);
      font-size: clamp(13px, 2.2vw, 22px);
      font-weight: bold;
      text-shadow: 1px 2px 4px rgba(0,0,0,0.6);
      z-index: 40;
      pointer-events: none;
    }

    /* iPad / tablet */
    @media (max-width: 820px) {
      #cameraBox {
        width: 145px;
        left: 8px;
        bottom: calc(8px + env(safe-area-inset-bottom, 0px));
        border-radius: 12px;
      }

      #controls {
        bottom: calc(14px + env(safe-area-inset-bottom, 0px));
      }

      #hole {
        right: 8vw;
      }

      #flagPole {
        right: calc(8vw + 55px);
      }

      #watermark {
        display: none;
      }
    }

    /* iPad แนวตั้ง */
    @media (orientation: portrait) {
      #topBar {
        align-items: flex-start;
        gap: 6px;
      }

      #brand {
        font-size: clamp(14px, 3.8vw, 24px);
        max-width: 65vw;
      }

      #scoreBoard {
        font-size: clamp(16px, 4vw, 24px);
        padding: 8px 12px;
      }

      #cameraBox {
        width: 130px;
      }

      #hole {
        top: 45%;
        right: 8vw;
      }

      #flagPole {
        top: 28%;
        right: calc(8vw + 48px);
      }

      #ball {
        left: 18vw;
        top: 62%;
      }

      #controls {
        width: 100%;
        justify-content: center;
        bottom: calc(12px + env(safe-area-inset-bottom, 0px));
      }

      button {
        padding: 12px 16px;
      }
    }
  </style>
</head>

<body>
  <div id="game">
    <div id="fairway"></div>

    <div id="topBar">
      <div id="brand">
        <img src="cliniclogo.jpg" alt="Clinic Logo">
        <span>วิริยพงศ์คลินิกกายภาพบำบัด</span>
      </div>

      <div id="scoreBoard">
        Score: <span id="score">0</span>
      </div>
    </div>

    <div id="message">เยี่ยมมาก!</div>

    <div id="flagPole"></div>
    <div id="hole"></div>
    <div id="ball"></div>

    <div id="cameraBox">
      <div id="cameraLabel">Camera</div>
      <video id="video" autoplay playsinline muted></video>
    </div>

    <div id="watermark">Wiriyaphong Physical Therapy Clinic</div>

    <div id="controls">
      <button id="startBtn">เริ่มเกม / เปิดกล้อง</button>
      <button id="hitBtn">ตีลูก</button>
      <button id="resetBtn">เริ่มใหม่</button>
    </div>
  </div>

  <script>
    const video = document.getElementById("video");
    const startBtn = document.getElementById("startBtn");
    const hitBtn = document.getElementById("hitBtn");
    const resetBtn = document.getElementById("resetBtn");
    const ball = document.getElementById("ball");
    const hole = document.getElementById("hole");
    const scoreEl = document.getElementById("score");
    const message = document.getElementById("message");

    let score = 0;
    let ballX = 16;
    let ballY = 58;
    let isMoving = false;

    function setBallPosition() {
      ball.style.left = ballX + "vw";
      ball.style.top = ballY + "%";
    }

    function showMessage(text) {
      message.textContent = text;
      message.classList.add("show");

      setTimeout(() => {
        message.classList.remove("show");
      }, 900);
    }

    function resetBall() {
      ballX = 16;
      ballY = 58;
      isMoving = false;
      ball.style.transform = "translate(-50%, -50%) scale(1)";
      setBallPosition();
    }

    function resetGame() {
      score = 0;
      scoreEl.textContent = score;
      resetBall();
      showMessage("เริ่มใหม่");
    }

    function checkGoal() {
      const ballRect = ball.getBoundingClientRect();
      const holeRect = hole.getBoundingClientRect();

      const bx = ballRect.left + ballRect.width / 2;
      const by = ballRect.top + ballRect.height / 2;
      const hx = holeRect.left + holeRect.width / 2;
      const hy = holeRect.top + holeRect.height / 2;

      const distance = Math.hypot(bx - hx, by - hy);

      if (distance < holeRect.width * 0.48) {
        score++;
        scoreEl.textContent = score;
        ball.style.transform = "translate(-50%, -50%) scale(0.45)";
        showMessage("ลงหลุม!");
        setTimeout(resetBall, 700);
        return true;
      }

      return false;
    }

    function hitBall() {
      if (isMoving) return;

      isMoving = true;

      const steps = 6;
      let currentStep = 0;

      const startX = ballX;
      const startY = ballY;

      const targetX = 88 + Math.random() * 4;
      const targetY = 46 + Math.random() * 10;

      const interval = setInterval(() => {
        currentStep++;

        const t = currentStep / steps;

        ballX = startX + (targetX - startX) * t;
        ballY = startY + (targetY - startY) * t + Math.sin(t * Math.PI) * -10;

        setBallPosition();

        if (checkGoal()) {
          clearInterval(interval);
          return;
        }

        if (currentStep >= steps) {
          clearInterval(interval);

          if (!checkGoal()) {
            showMessage("ลองใหม่");
            setTimeout(resetBall, 700);
          }
        }
      }, 130);
    }

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: "user",
            width: { ideal: 640 },
            height: { ideal: 480 }
          },
          audio: false
        });

        video.srcObject = stream;

        startBtn.style.display = "none";
        hitBtn.style.display = "inline-block";
        resetBtn.style.display = "inline-block";

        showMessage("พร้อมเล่น");
      } catch (err) {
        alert("เปิดกล้องไม่ได้ กรุณาอนุญาต Camera ใน Safari/Chrome แล้วลองใหม่");
        console.error(err);
      }
    }

    startBtn.addEventListener("click", startCamera);
    hitBtn.addEventListener("click", hitBall);
    resetBtn.addEventListener("click", resetGame);

    document.addEventListener("keydown", function(e) {
      if (e.code === "Space") {
        hitBall();
      }
    });

    // แตะหน้าจอ iPad เพื่อตีลูกได้
    document.getElementById("game").addEventListener("touchstart", function(e) {
      const target = e.target.tagName.toLowerCase();
      if (target !== "button") {
        hitBall();
      }
    });

    resetBall();
  </script>
</body>
</html>
