<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Golf Rehab Game</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100dvh;
  overflow: hidden;
  font-family: Arial, sans-serif;
  background: linear-gradient(#7fd66b, #2f8f46);
}

#game {
  position: relative;
  width: 100vw;
  height: 100dvh;
  overflow: hidden;
}

#logo {
  position: fixed;
  top: 10px;
  left: 10px;
  width: 70px;
  z-index: 30;
}

#clinicName {
  position: fixed;
  top: 18px;
  left: 90px;
  font-size: 22px;
  font-weight: bold;
  color: white;
  text-shadow: 2px 2px 4px #000;
  z-index: 30;
}

#score {
  position: fixed;
  top: 55px;
  left: 90px;
  font-size: 22px;
  font-weight: bold;
  color: white;
  z-index: 30;
}

#cameraBox {
  position: fixed;
  right: 10px;
  bottom: 10px;
  width: min(26vw, 190px);
  aspect-ratio: 4 / 3;
  border: 3px solid white;
  border-radius: 16px;
  overflow: hidden;
  background: black;
  z-index: 40;
}

#video {
  width: 100%;
  height: 100%;
  object-fit: contain;
  transform: scaleX(-1);
  background: black;
}

#course {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 50% 70%, #4caf50 0%, #3c9d43 40%, #2d7d34 100%);
}

.hole {
  position: absolute;
  width: 70px;
  height: 45px;
  background: radial-gradient(circle, #000 20%, #222 60%, #111 100%);
  border-radius: 50%;
  box-shadow: inset 0 0 12px #000;
}

.ball {
  position: absolute;
  width: 45px;
  height: 45px;
  background: radial-gradient(circle at 30% 30%, white, #ddd);
  border-radius: 50%;
  box-shadow: 0 4px 8px #333;
  transition: 0.25s;
}

#startBtn {
  position: fixed;
  left: 50%;
  bottom: 25px;
  transform: translateX(-50%);
  padding: 14px 34px;
  font-size: 24px;
  font-weight: bold;
  border: none;
  border-radius: 16px;
  background: white;
  color: #167a35;
  z-index: 50;
}

@media (max-width: 820px) {
  #cameraBox {
    width: 135px;
    right: 8px;
    bottom: 8px;
  }

  #logo {
    width: 55px;
  }

  #clinicName {
    left: 72px;
    font-size: 17px;
  }

  #score {
    left: 72px;
    top: 47px;
    font-size: 18px;
  }

  .hole {
    width: 55px;
    height: 36px;
  }

  .ball {
    width: 36px;
    height: 36px;
  }
}
</style>
</head>

<body>
<div id="game">
  <div id="course"></div>

  <img id="logo" src="cliniclogo.jpg">
  <div id="clinicName">วิริยพงศ์คลินิกกายภาพบำบัด</div>
  <div id="score">คะแนน: 0</div>

  <div id="cameraBox">
    <video id="video" autoplay playsinline muted></video>
  </div>

  <button id="startBtn">เริ่มเกม</button>
</div>

<script>
const video = document.getElementById("video");
const game = document.getElementById("game");
const scoreText = document.getElementById("score");
const startBtn = document.getElementById("startBtn");

let score = 0;
let ball;
let hole;

function randomPosition() {
  const w = window.innerWidth;
  const h = window.innerHeight;

  return {
    x: Math.random() * (w - 160) + 50,
    y: Math.random() * (h - 220) + 120
  };
}

function createGameObjects() {
  if (ball) ball.remove();
  if (hole) hole.remove();

  hole = document.createElement("div");
  hole.className = "hole";

  ball = document.createElement("div");
  ball.className = "ball";

  const holePos = randomPosition();
  const ballPos = randomPosition();

  hole.style.left = holePos.x + "px";
  hole.style.top = holePos.y + "px";

  ball.style.left = ballPos.x + "px";
  ball.style.top = ballPos.y + "px";

  game.appendChild(hole);
  game.appendChild(ball);
}

function moveBall() {
  const holeRect = hole.getBoundingClientRect();

  ball.style.left = holeRect.left + 10 + "px";
  ball.style.top = holeRect.top - 5 + "px";

  score++;
  scoreText.innerText = "คะแนน: " + score;

  setTimeout(createGameObjects, 700);
}

async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: "user",
        width: { ideal: 640 },
        height: { ideal: 480 }
      },
      audio: false
    });

    video.srcObject = stream;
  } catch (err) {
    alert("เปิดกล้องไม่ได้ กรุณาอนุญาตกล้องใน Safari หรือ Chrome");
  }
}

startBtn.addEventListener("click", async () => {
  startBtn.style.display = "none";
  await startCamera();
  createGameObjects();

  setInterval(() => {
    moveBall();
  }, 2200);
});
</script>
</body>
</html>
